<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@900&family=Syne:wght@800&family=Montserrat:wght@500;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles/styles.css"> <title>Connect | Church Name</title>
</head>
<body class="internal-page">

<header class="header internal-header">
  <div class="container">
    <a href="index.html" class="logo">CHURCH<span class="logo-accent">NAME</span></a>
    <a href="index.html" class="back-link">← Back to Home</a>
  </div>
</header>

<main class="internal-main">
  <div class="container stack">
    <div class="form-container mouse-follow">
      <h1 class="section-title">Save Your <span>Spot</span></h1>
      <p class="section-subtitle">Interest Night — April 18. We can't wait to meet you!</p>

      <form class="action-form">
        <div class="input-group">
          <input type="text" placeholder="Full Name" required>
        </div>
        <div class="input-group">
          <input type="email" placeholder="Email Address" required>
        </div>
        <div class="input-group">
          <input type="tel" placeholder="Phone Number">
        </div>

        <div class="input-group">
          <textarea placeholder="Anything we should know? (Optional)"></textarea>
        </div>

        <button type="submit" class="btn-final shine-effect">Send Request</button>
      </form>
    </div>
  </div>
</main>

<script src="scripts.js"></script>

</body>
</html>
