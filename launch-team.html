<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@900&family=Syne:wght@800&family=Montserrat:wght@500;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles/styles.css">
  <title>Join the Team | Church Name</title>
</head>
<body class="internal-page">
<header class="header internal-header">
  <div class="container">
    <a href="index.html" class="logo">CHURCH<span class="logo-accent">NAME</span></a>
    <a href="index.html" class="back-link">← Back</a>
  </div>
</header>

<main class="internal-main">
  <div class="container stack">
    <div class="form-container mouse-follow">
      <h1 class="section-title">Launch <span>Team</span></h1>
      <p class="section-subtitle">Ready to build? Select the team you'd like to join.</p>

      <form class="action-form">
        <input type="text" placeholder="Full Name" required>
        <select class="custom-select" required>
          <option value="" disabled selected>Select a Team</option>
          <option value="worship">Worship Team</option>
          <option value="welcome">Welcome Team</option>
          <option value="kids">Kids Team</option>
          <option value="setup">Setup Team</option>
        </select>
        <input type="tel" placeholder="Phone Number">
        <textarea placeholder="Tell us about your experience or why you'd like to join."></textarea>
        <button type="submit" class="btn-final shine-effect">Join the Team</button>
      </form>
    </div>
  </div>
</main>
</body>

<script src="scripts.js"></script>
</html>
