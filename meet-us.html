<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@900&family=Syne:wght@800&family=Montserrat:wght@500;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles/styles.css">
  <title>Meet Us | Church Name</title>
</head>
<body class="internal-page">
<header class="header internal-header">
  <div class="container">
    <a href="index.html" class="logo">CHURCH<span class="logo-accent">NAME</span></a>
    <a href="index.html" class="back-link">← Back</a>
  </div>
</header>

<main class="internal-main">
  <div class="container stack">
    <div class="form-container mouse-follow">
      <h1 class="section-title">Meet <span>Us</span></h1>
      <p class="section-subtitle">We’d love to grab coffee and hear your story.</p>

      <form class="action-form">
        <input type="text" placeholder="Full Name" required>
        <input type="email" placeholder="Email Address" required>
        <textarea placeholder="When is the best time to connect with you?"></textarea>
        <button type="submit" class="btn-final shine-effect">Request a Meeting</button>
      </form>
    </div>
  </div>
</main>
</body>

<script src="scripts.js"></script>
</html>
