<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@900&family=Syne:wght@800&family=Montserrat:wght@500;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles/styles.css">
  <title>Give | Church Name</title>
</head>
<body class="internal-page">
<header class="header internal-header">
  <div class="container">
    <a href="index.html" class="logo">CHURCH<span class="logo-accent">NAME</span></a>
    <a href="index.html" class="back-link">← Back</a>
  </div>
</header>

<main class="internal-main">
  <div class="container stack">
    <div class="form-container mouse-follow">
      <h1 class="section-title">Support <span>the Vision</span></h1>
      <p class="section-subtitle">Thank you for helping us launch this church in Houston.</p>

      <div class="give-options">
        <button class="give-btn">$25</button>
        <button class="give-btn active">$50</button>
        <button class="give-btn">$100</button>
        <button class="give-btn">$250</button>
      </div>

      <form class="action-form">
        <input type="number" placeholder="Other Amount ($)">
        <button type="submit" class="btn-final shine-effect">Proceed to Give</button>
      </form>
    </div>
  </div>
</main>
</body>
<script src="scripts.js"></script>
</html>
